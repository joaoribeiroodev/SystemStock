<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/color.css" />
    <link rel="stylesheet" href="../css/cadastro.css" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

</head>

<body>
    <header id="header">
        <h1 id="tituloCadastro">SystemStock</h1>
        <nav id="menu">
            <ul class="menu-lista">
                <li><a href="dashboard.html">Inicio</a></li>
                <li><a href="gerenciamento.html">Gerenciamento</a></li>
            </ul>
        </nav>
    </header>
    <main id="main">
        <form action="cadastro" method="POST">
            <div class="container">
                <div class="dadosPessoais">
                    <div class="input-camp">
                        <label for="nameFirst">Nome</label>
                        <input type="text" name="nameFirst" id="nameFirst" placeholder="Digite o seu Nome" />
                    </div>

                    <div class="input-camp">
                        <label for="sobreNome">Sobrenome</label>
                        <input type="text" name="sobreNome" id="sobreNome" placeholder="Digite o seu sobreNome" />
                    </div>

                    <div class="input-camp">
                        <label for="matricula">Matricula</label>
                        <input type="text" name="matricula" id="matricula" placeholder="Digite a sua matricula" />
                    </div>

                    <div class="input-camp">
                        <label for="cpf">CPF</label>
                        <input type="text" name="cpf" id="cpf" placeholder="Digite o seu CPF" />
                    </div>

                    <div class="input-camp">
                        <p>Sexo</p>
                        <select name="opcao">
                            <option value="">Selecione o sexo</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Feminino">Feminino</option>
                        </select>
                    </div>

                    <div class="input-camp">
                        <label for="dtaNascimento">Data de nascimento</label>
                        <input type="date" name="dtaNascimento" id="dtaNascimento" required/>
                        <span id="avisoErro" style="color: red; display: none; font-size: 14px; margin-left: 10px;">
                            A data de nascimento não pode ser no futuro!
                        </span>
                    </div>

                    <div class="input-camp">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="Digite o seu E-mail" />
                    </div>

                    <div class="input-camp">
                        <label for="telefone">Telefone</label>
                        <input type="tel" name="telefone" placeholder="(00) 0 0000-0000" />
                    </div>

                    <div class="input-camp">
                        <label for="usuario">Usuário</label>
                        <input type="text" name="usuario" id="usuario" placeholder="Digite o seu usuario" />
                    </div>

                    <div class="input-camp">
                        <label for="senha">Senha</label>
                        <input type="password" name="psw" id="senha" placeholder="Digite a sua senha" />
                    </div>

                    <div class="input-camp">
                        <label for="funcao">Função</label>
                        <input type="text" name="funcao" id="funcao" placeholder="Digite a sua Função" />
                    </div>

                </div>
                <div class="containerEndereco">

                    <div class="input-camp">
                        <label for="cep">CEP</label>
                        <input type="text" name="cep" id="cep" />
                    </div>

                    <div class="input-camp">
                        <label for="endereco">Endereço</label>
                        <input type="text" name="endereco" id="endereco" />
                    </div>

                    <div class="input-camp">
                        <label for="bairro">Bairro</label>
                        <input type="text" name="bairro" id="bairro" />
                    </div>

                    <div class="input-camp">
                        <label for="cidade">Cidade</label>
                        <input type="text" name="cidade" id="cidade" />
                    </div>

                    <div class="input-camp">
                        <label for="estado">Estado</label>
                        <input type="text" name="estado" id="estado" />
                    </div>

                    <div class="input-camp">
                        <label for="numero">Número</label>
                        <input type="text" name="numero" id="numero" />
                    </div>

                    <div class="input-camp">
                        <label for="complemento">Complemento</label>
                        <input type="text" name="complemento" id="complemento" />
                    </div>

                </div>
                <div class="btn">
                    <button type="submit">Cadastrar</button>

                </div>
            </div>
        </form>
    </main>
    <script src="../js/cep.js"></script>
    <script src="../js/cadastro.js"></script>
</body>

</html>
