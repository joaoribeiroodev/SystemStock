<!DOCTYPE html>
<html>
    
    <head>
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    
    <body>
        <header>
            <h1>SystemStock</h1>
            <nav>
                <ul>

                    <li><a href="#">Gerenciamento</a></li>

            </nav>

        <main>
            <section>

                    <input type="date">

                    <select>
                        <option>selecione uma opção</option>

                    </select>

                    <label>Pesquisar item</label>

                </div>
                <div>
                    <button>Pesquisar</button>
                </div>
            </section>
            <<section>
                <div>
                    <table>
                        <thead>
                            <tr>
                                <th>Código de barras</th>
                                <th>Nome</th>
                                <th>Fabricante</th>
                                <th>Marca</th>
                                <th>Quantidade</th>
                                <th>Valor unitário</th>
                                <th>Total</th>                            
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>123456789</td>
                                <td>Mouse</td>
                                <td>Logitech</td>
                                <td>MX</td>
                                <td>10</td>
                                <td>R$80,00</td>
                                <td>R$800,00</td>
                            </tr>
                            <tr>
                                <td>987456321</td>
                                <td>Teclado</td>
                                <td>Logitech</td>
                                <td>MX</td>
                                <td>20</td>
                                <td>R$120,00</td>
                                <td>R$2400,00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            <section>
                <div>
                    <label>Página</label>
                    <select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </div>
                <div>
                    <button>Voltar</button>
                    <button>Próximo</button>
                </div>
            </section>
        </main>

</html>
