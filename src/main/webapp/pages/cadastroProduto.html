<!DOCTYPE html>
<html>

<head>
    <title>Cadastro Produto</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/color.css" />
    <link rel="stylesheet" href="../css/cadastroProduto.css">
</head>

<body>
    <header id="header">
        <h1 id="tituloCadastro">SystemStock</h1>
        <nav id="menu">
            <ul class="menu-lista">
                <li><a href="dashboard.html">Início</a></li>
                <li><a href="gerenciamento.html">Gerenciamento</a></li>
                <li><a href="cadastro.html" class="btn-menu" data-menu="cadastro-usuario">Cadastro Usuário</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="form-container">
            <div id="banner-erro-cadastro" class="banner-erro-cadastro oculto" role="alert" aria-live="polite"></div>
            <form action="../cadastroProdutos" method="POST" id="formCadastro">

                <div class="grupo-form">
                    <label for="codigoBarras">Código de Barras</label>
                    <input type="text" name="codigoBarras" id="codigoBarras" readonly required />
                </div>

                <div class="grupo-form">
                    <label for="nomeProduto">Nome do Produto</label>
                    <input type="text" name="nomeProduto" id="nomeProduto" required />
                </div>

                <div class="grupo-form">
                    <label class="fabricante" for="fabricante">Fabricante</label>
                    <input type="text" name="fabricante" id="fabricante" required />
                </div>

                <div class="grupo-form">
                    <label for="marca">Marca</label>
                    <input type="text" name="marca" id="marca" required />
                </div>

                <div class="grupo-form">
                    <label class="dataFabricacao" for="dataFabricacao">Data de Fabricação</label>
                    <input type="date" name="dataFabricacao" id="dataFabricacao" required />
                </div>

                <div class="grupo-form">
                    <label class="dataVencimento" for="dataVencimento">Data de Vencimento</label>
                    <input type="date" name="dataVencimento" id="dataVencimento" required />
                </div>

                <div class="grupo-form">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" name="quantidade" id="quantidade" min="1" step="1" required pattern="\d*"/>
                    <span id="avisoErro" class="mensagem-erro">Por favor, digite apenas números.</span>
                </div>

                <div class="grupo-form">
                    <label for="quantidadeMinima">Quantidade Mínima de Estoque</label>
                    <input type="number" name="quantidadeMinima" id="quantidadeMinima" min="1" step="1" required />
                </div>

                <div class="grupo-form">
                    <label for="valor">Valor Unitário</label>
                    <input type="number" name="valor" id="valor" min="0.01" step="0.01" required />
                </div>

                <div class="grupo-form">
                    <label for="prateleira">Prateleira</label>
                    <input type="text" name="prateleira" id="prateleira" placeholder="Ex.: A1, Corredor 3" maxlength="50" required />
                </div>

                <div class="grupo-form">
                    <label for="localArmazenamento">Local de Armazenamento</label>
                    <input type="text" name="localArmazenamento" id="localArmazenamento" placeholder="Ex.: Depósito Central" maxlength="100" required />
                </div>

                <div class="grupo-form full">
                    <label>Total</label>
                    <input type="number" name="total" id="total" readonly />
                </div>

                <div class="acoes-form">
                    <button type="submit" class="btn-salvar">Salvar</button>
                    <a href="dashboard.html" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </section>
    </main>

    <script src="../js/cadastroProduto.js"></script>
    <script src="../js/validarLogin.js"></script>

</body>

</html>
