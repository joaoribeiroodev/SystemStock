<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/gerenciamento.css">
    <title>Gerenciamento</title>
</head>

<body>
    <header id="header">
        <h1 id="tituloCadastro">SystemStock</h1>
        <nav id="menu">
            <ul class="menu-lista">
                <li><a href="dashboard.html">Início</a></li>
                <li><a href="#">Gerenciamento</a></li>
            </ul>
        </nav>
    </header>

    <section class="nav-lateral">
        <h1>Navegação</h1>
        <nav class="navegacao-lteral">
            <a href="">Gráfico</a>
            <a href="">Produtos</a>

        </nav>
    </section>

    <main>
        <section id="grafico">
            <div class="card-grafico">
                <h2>Movimentações de Estoque</h2>
                <canvas id="graficoGerenciamento"></canvas>
            </div>
        </section>

        <section id="ProdutosGerenciamento">
            <div class="tabela-wrapper">
                <table id="tabelaProdGerenciamento">
                    <thead>
                        <tr>
                            <th>Código de barras</th>
                            <th>Nome</th>
                            <th>Quantidade</th>
                            <th>Valor unitário</th>
                            <th>Total</th>
                            <th>Status</th> 
                        </tr>
                    </thead>
                    <tbody id="tabelaGerenciamentoProdutos">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/grafico.js"></script>
</body>

</html>
